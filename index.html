<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VawesTS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="container">
        <h1>
            Vawes2d 
            <small id="params"></small><b id="time"></b>
        </h1>
        <div>
            k/m: <input type="text" id="k_m" value="5/10" >
            loss: <input type="text" id="l" value="0.99" >
            t: <input type="text" id="tact" value="10" >
            
            <button id="resetButton">Reset</button>
            <button id="runButton">Run</button>

            <input type="range" id="zScale" min="1" max="100" value="50">
            
            <input type="radio" id="stone" name="state" />Bar                        
            <input type="radio" id="osc" name="state" checked />Osc
            <input type="text" id="lambda" value="20" title="Період - тривалість одного коливання осцілятору">
        </div>

        <canvas id="canvas" width="500" height="500" style="width: 1000px; height: 1000px;"></canvas>

    </main>
    <script type="module" src="dist/main.js"></script>
</body>
</html>
