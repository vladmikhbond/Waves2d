<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VawesTS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="container">
        <h1>
            Vawes 2d 
            <span id="time"></span> 
        </h1>
        <div>
            <input id="params" type="text" value="size = 500;  k = 0.49;  loss = 0.0 " style="width: 350px;">
            <button id="resetButton">C</button>

            <select id="state" aria-label="Select" required>
                <option value="Inf" >Inf</option>
                <option value="Sto">Sto</option>
                <option value="Osc" selected >Osc</option>
                <option value="Mon">Mon</option>
                <option value="Del">Del</option>
            </select>     
            
            <input id="oscilParams" type="text" value="amp = 1;  q = 0.25" style="width: 250px;">

            <button id="runButton" title="Run | Stop">Run</button>
            <button id="dButton" title="2d | 3d">3d</button>
        </div>
        <div>
            <input type="range" id="zScale" min="1" max="500" value="50">
            <span id="info"></span>
        </div>
            
        <div class="canvas-frame">
            <canvas id="canvas2d"></canvas>
            <canvas id="canvas3d"></canvas>
        </div>
    </main>
    <script type="module" src="main.js"></script>
</body>
</html>
