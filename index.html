<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VawesTS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="container">
        <h1>
            Vawes 
            <small id="params"></small><b id="time"></b> <b id="info"></b>
        </h1>
        <div>
            k/m: <input type="text" id="k_m" value="5/10" >
            loss: <input type="text" id="l" value="0.99" >
            
            <button id="resetButton" title="Clear">C</button>
            <button id="runButton" title="Run | Stop">Run</button>
            <button id="dButton" title="2d | 3d">D</button>

            <input type="range" id="zScale" min="1" max="100" value="50">
            
            <input type="radio" id="test" name="state" /> 
            <label for="test">👓</label>                       
            <input type="radio" id="stone" name="state" /> 
            <label for="stone">⛔</label>                         
            <input type="radio" id="osc" name="state" checked />
            <label for="osc">🔔</label>
            <input type="text" id="lambda" value="20" title="Період - тривалість одного коливання осцілятору">
        </div>

        <canvas id="canvas2d" width="500" height="500" style="width: 1000px; height: 1000px; display:block;"></canvas>
        <canvas id="canvas3d" width="500" height="500" style="width: 1000px; height: 1000px; display: none;"></canvas>
    </main>
    <script type="importmap">
    {
      "imports": {
        "three": "/node_modules/three/build/three.module.js"
      }
    }
    </script>
    <script type="module" src="dist/main.js"></script>
</body>
</html>
