<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VawesTS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="container">
        <h1>
            Vawes 2d 
            <!-- <small id="params"></small> -->
            <b id="time"></b> 
            <b id="info"></b>
        </h1>
        <div>
            size: <input type="text" id="size" value="600">
            k/m: <input type="text" id="k_m" value=".49" title="0 < k/m <= 1/2">
            loss: <input type="text" id="loss" value=".0" >
            

            <select id="state" aria-label="Select" required>
                <option value="Inf" >Inf</option>
                <option value="Sto">Sto</option>
                <option value="Osc" selected >Osc</option>
                <option value="Mon">Mon</option>
                <option value="Del">Del</option>
            </select>     
            
            <input id="oscill_ampl" value="1." style="width: 120px;" title="Амплитуда коливань">
            <input id="oscill_q"   value=".25" style="width: 120px;" title="Хвильове число - q = 2π/λ ">

            <button id="resetButton" title="Clear">C</button>
            <button id="runButton" title="Run | Stop">Run</button>
            <button id="dButton" title="2d | 3d">3d</button>
        </div>
        <div>
            <input type="range" id="zScale" min="1" max="100" value="50">
        </div>
            
        <div class="canvas-frame">
            <canvas id="canvas2d"></canvas>
            <canvas id="canvas3d"></canvas>
        </div>
    </main>
    <script type="module" src="main.js"></script>
</body>
</html>
